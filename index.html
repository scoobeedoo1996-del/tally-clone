<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TallyPrime Mobile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="app">
        <div id="main-screen" class="screen">
            <header class="tally-header">
                <h1>Select Company</h1>
                <p>TallyPrime Cloud Access</p>
            </header>
            <div id="company-list" class="list-container"></div>
            <button id="fab" class="fab" onclick="showCreateScreen()">+</button>
        </div>

        <div id="create-screen" class="screen hidden">
            <header class="tally-header header-nav">
                <button class="back-btn" onclick="hideCreateScreen()">❮ Back</button>
                <h1>Company Creation</h1>
            </header>
            
            <div class="form-container">
                <form id="create-company-form">
                    <div class="section-title">Company Directory</div>
                    <div class="input-group">
                        <label>Company Name *</label>
                        <input type="text" id="company_name" required placeholder="e.g. My Awesome Business">
                    </div>
                    <div class="input-group">
                        <label>Mailing Name</label>
                        <input type="text" id="mailing_name">
                    </div>
                    <div class="input-group">
                        <label>Address</label>
                        <textarea id="address" rows="3"></textarea>
                    </div>

                    <div class="row">
                        <div class="input-group half">
                            <label>State</label>
                            <input type="text" id="state">
                        </div>
                        <div class="input-group half">
                            <label>Country</label>
                            <input type="text" id="country" value="India">
                        </div>
                    </div>

                    <div class="section-title">Contact Details</div>
                    <div class="row">
                        <div class="input-group half">
                            <label>Mobile No.</label>
                            <input type="tel" id="mobile">
                        </div>
                        <div class="input-group half">
                            <label>Email</label>
                            <input type="email" id="email">
                        </div>
                    </div>

                    <div class="section-title">Books and Financial Year Details</div>
                    <div class="row">
                        <div class="input-group half">
                            <label>Financial Year Begins From *</label>
                            <input type="date" id="fy_start" required>
                        </div>
                        <div class="input-group half">
                            <label>Books Beginning From *</label>
                            <input type="date" id="books_start" required>
                        </div>
                    </div>

                    <button type="submit" class="submit-btn" id="save-btn">Accept (Save)</button>
                </form>
            </div>
        </div>
        <div id="dashboard-screen" class="screen hidden">
    <header class="tally-header">
        <div class="header-nav">
            <button class="back-btn" onclick="exitCompany()">❮ Exit</button>
            <h1 id="active-company-name">Company Name</h1>
        </div>
        <p id="active-company-period">P: 1-Apr-2024 to 31-Mar-2025</p>
    </header>

    <div class="dashboard-grid">
        <div class="grid-section">
            <h2 class="section-label">Masters</h2>
            <div class="grid-container">
                <button class="menu-card" onclick="openLedgers()">
                    <span class="icon">📁</span>
                    <span>Create Ledger</span>
                </button>
                <button class="menu-card" onclick="openStockItems()">
                    <span class="icon">📦</span>
                    <span>Stock Items</span>
                </button>
            </div>
        </div>

        <div class="grid-section">
            <h2 class="section-label">Transactions</h2>
            <div class="grid-container">
                <button class="menu-card primary-card" onclick="openVoucherEntry()">
                    <span class="icon">📝</span>
                    <span>Voucher Entry</span>
                </button>
            </div>
        </div>

        <div class="grid-section">
            <h2 class="section-label">Reports</h2>
            <div class="grid-container">
                <button class="menu-card" onclick="viewBalanceSheet()">
                    <span class="icon">📊</span>
                    <span>Balance Sheet</span>
                </button>
                <button class="menu-card" onclick="viewProfitLoss()">
                    <span class="icon">📈</span>
                    <span>P & L A/c</span>
                </button>
            </div>
        </div>
    </div>
</div>
    </div>

    <script src="supabaseClient.js"></script>
    <script src="app.js"></script>
</body>
</html>
